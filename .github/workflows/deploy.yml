name: CD Pipeline

on:
  push:
    branches:
      - main
jobs:
  deploy:
    runs-on: ubuntu-latest 

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Backend Docker Image
        run: |
          docker build -t abdullahkhan203/mern-backend:latest .     

      - name: Build Frontend Docker Image
        run: |
          docker build -t abdullahkhan203/mern-frontend:latest ./frontend
          
      - name: Push Backend Docker Image
        run: |
          docker push abdullahkhan203/mern-backend:latest
          
      - name: Push Frontend Docker Image
        run: |
          docker push abdullahkhan203/mern-frontend:latest                  